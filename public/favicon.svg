<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128" width="128" height="128">
  <defs>
    <linearGradient id="logoGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#d946ef;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="logoGrad2" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00ffff;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#a855f7;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#f59e0b;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- 背景圆角方形 -->
  <rect x="4" y="4" width="120" height="120" rx="28" ry="28"
        fill="#0a0a20" stroke="url(#logoGrad)" stroke-width="3"/>

  <!-- K 字母主体 -->
  <g transform="translate(20, 16)">
    <!-- K 竖线 -->
    <rect x="18" y="4" width="14" height="88" rx="7" fill="url(#logoGrad)"/>

    <!-- K 上斜臂 -->
    <path d="M32 8 L68 44 L52 48 L32 36 Z"
          fill="url(#logoGrad2)" stroke-linejoin="round"/>

    <!-- K 下斜臂 -->
    <path d="M32 56 L66 88 L50 92 L32 60 Z"
          fill="url(#logoGrad2)" stroke-linejoin="round"/>

    <!-- 音乐音符装饰 -->
    <circle cx="78" cy="26" r="9" fill="none" stroke="#00ffff" stroke-width="2.5"/>
    <line x1="86" y1="26" x2="86" y2="8" stroke="#00ffff" stroke-width="2.5" stroke-linecap="round"/>
    <!-- 音符旗 -->
    <path d="M86 8 Q96 10 86 20" fill="none" stroke="#d946ef" stroke-width="2.5" stroke-linecap="round"/>
  </g>
</svg>
