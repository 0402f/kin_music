# Kin App — Nginx 配置模板
# 放置到 /etc/nginx/sites-available/kin-app 并创建软链接到 sites-enabled/

server {
    listen 80;
    server_name your-domain.com;  # ← 改成你的域名

    # 上传限制
    client_max_body_size 50m;

    # ==================== 音乐源代理 ====================
    # 规则必须在 /api/ 通用规则之前，否则会被覆盖

    location /api/music-source/ {
        proxy_pass http://127.0.0.1:3456/api/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # 超时设置（音乐源搜索可能较慢）
        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 10s;
    }

    # ==================== Java 后端 API ====================

    location /api/ {
        proxy_pass http://127.0.0.1:5210/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_connect_timeout 10s;
        proxy_read_timeout 30s;
        proxy_send_timeout 30s;
    }

    # ==================== 前端静态文件 ====================

    location / {
        root /opt/kin-app/dist;
        index index.html;
        try_files $uri $uri/ /index.html;

        # 静态资源缓存
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 30d;
            add_header Cache-Control "public, immutable";
        }
    }

    # ==================== 日志 ====================

    access_log /var/log/nginx/kin-app-access.log;
    error_log  /var/log/nginx/kin-app-error.log;
}
